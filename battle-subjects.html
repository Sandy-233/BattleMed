<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Subjects</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#07131d;
color:white;
}

header{
padding:25px;
text-align:center;
font-size:40px;
font-weight:bold;
color:#00ff99;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{

background:#122231;

padding:30px;

border-radius:20px;

text-align:center;

cursor:pointer;

transition:.3s;

text-decoration:none;

color:white;

font-size:28px;

font-weight:bold;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 25px #00ff99;

}

.back{

display:block;

width:220px;

margin:40px auto;

padding:18px;

background:#00ff99;

color:black;

text-align:center;

text-decoration:none;

font-weight:bold;

border-radius:15px;

font-size:20px;

}

</style>

</head>

<body>

<header>

⚔️ Choose Battle Subject

</header>

<div class="container">

<div class="grid">

<a href="#" class="card" onclick="startBattle('Pathology')">
🧬<br><br>
Pathology
</a>

<a href="#" class="card" onclick="startBattle('Pharmacology')">
💊<br><br>
Pharmacology
</a>

<a href="#" class="card" onclick="startBattle('Microbiology')">
🦠<br><br>
Microbiology
</a>
<a href="#" class="card" onclick="startBattle('Physiology')">

🫀<br><br>
Physiology
</a>

<a href="#" class="card" onclick="startBattle('Anatomy')">
🦴<br><br>
Anatomy
</a>

<a href="#" class="card" onclick="startBattle('Biochemistry')">
🧪<br><br>
Biochemistry
</a>

<a href="#" class="card" onclick="startBattle('FMT')">
⚖️<br><br>
FMT
</a>

<a href="#" class="card" onclick="startBattle('PSM')">
🌍<br><br>
PSM
</a>

<a href="#" class="card" onclick="startBattle('Mixed')">
🎲<br><br>
Mixed Subjects
</a>

</div>

<a href="battle-arena.html" class="back">

⬅ Back to Battle Arena

</a>

</div>
  <script>
function startBattle(subject){
    localStorage.setItem("battleSubject", subject);
    window.location.href = "practice-battle.html";
}
  </script>

</body>

</html>
