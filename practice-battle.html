<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Practice Battle</title>

<style>

body{
background:#07131d;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.card{
max-width:800px;
margin:auto;
background:#122231;
padding:25px;
border-radius:20px;
}

h2{
color:#00ff99;
}

button{
display:block;
width:100%;
margin-top:12px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#00ff99;
color:black;
}

</style>

</head>

<body>

<div class="card">

<h2 id="question">Loading...</h2>

<button id="A" onclick="checkAnswer(0)"></button>

<button id="B" onclick="checkAnswer(1)"></button>

<button id="C" onclick="checkAnswer(2)"></button>

<button id="D" onclick="checkAnswer(3)"></button>

<br>

<h3 id="score">
Score : 0
</h3>

</div>

<script src="questions.js"></script>

<script>

let current=0;

let score=0;

function loadQuestion(){

document.getElementById("question").innerText=
QUESTIONS[current].question;

document.getElementById("A").innerText=
QUESTIONS[current].options[0];

document.getElementById("B").innerText=
QUESTIONS[current].options[1];

document.getElementById("C").innerText=
QUESTIONS[current].options[2];

document.getElementById("D").innerText=
QUESTIONS[current].options[3];

}

function checkAnswer(choice){

if(choice===QUESTIONS[current].correct){

score++;

}

current++;

document.getElementById("score").innerText=
"Score : "+score;

if(current>=QUESTIONS.length){

document.querySelector(".card").innerHTML=

"<h1>Battle Finished</h1><h2>Your Score : "+score+"/"+QUESTIONS.length+"</h2>";

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
